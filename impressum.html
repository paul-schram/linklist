<!DOCTYPE html>
<!-- Diese Texte sind keine Rechtsberatung und müssen auf eigene Gefahr geprüft werden. -->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        .container { width: 100%; max-width: 580px; flex: 1; }

        h1 {
            font-size: 40px;
            font-weight: 800;
            margin-top: 70px;
            margin-bottom: 40px;
        }

        h2 { color: var(--accent); margin-top: 32px; font-size: 1.2rem; }
        p { color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
        a { color: var(--accent); text-decoration: none; transition: var(--transition); }
        a:hover { color: var(--accent-hover); }

        /* Zurück-Button im Stil der Hauptseite */
        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        .link-card:hover { transform: scale(1.02); border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .link-card img { filter: invert(1); }

        /* Footer exakt wie Hauptseite */
        footer {
            margin-top: auto;
            padding-top: 60px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Impressum</h1>
    <p><strong>Angaben gemäß § 5 TMG</strong></p>
    <p>Vorname Nachname<br>Adresse</p>

    <h2>Kontakt</h2>
    <p>E-Mail: <a href="mailto:emailadresse">emailadresse</a></p>

    <a href="index.html" class="link-card">
        Zurück zur Übersicht
    </a>
</div>

<footer>
    <div class="footer-links">
        <a href="index.html" style="color: var(--text-secondary)">Home</a>
        <a href="datenschutz.html" style="color: var(--text-secondary)">Datenschutz</a>
    </div>
</footer>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
