<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorname Nachname</title>
    <style>
        /* CSS Variablen für einfaches Anpassen der Farben */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --button-bg: #1e293b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                    radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 20%),
                    radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.05) 0%, transparent 20%);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Container & Header */
        .container {
            width: 100%;
            max-width: 580px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin-bottom: 16px;
            border: 2px solid var(--accent);
            padding: 4px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        /* Buttons / Links */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: var(--transition);
            display: block;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 60px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        /* Mobile Optimierung */
        @media (max-width: 480px) {
            body { padding: 30px 15px; }
            h1 { font-size: 1.25rem; }
        }
        .link-card img {
            vertical-align: middle; /* Schiebt das Bild auf die mittlere Höhe des Textes */
            margin-bottom: 4px;     /* Manuelles Feintuning, falls es immer noch leicht hakt */
        }
        h1 {
            font-size: 40px; /* Standard ist ca. 32px, hier verdoppeln wir fast */
            font-weight: 800; /* Macht die Schrift zusätzlich "fetter" */
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-top: 70px; margin-bottom: 70px">Vorname Nachname</h1>

    <div class="links-wrapper">
        <a href="mailto:emailadresse" class="link-card">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/maildotru.svg" width="20" height="20" alt="E-Mail Icon">
            E-Mail schreiben
        </a>
        <a href="#Link einfügen" class="link-card">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/signal.svg" width="20" height="20" alt="Signal Logo">
            Signal-Nachricht
        </a>
        <a href="#Link einfügen" class="link-card">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg" width="20" height="20" alt="Discord Logo">
            Discord
        </a>
        <a href="#Link einfügen" class="link-card">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg" width="20" height="20" alt="GitHub Logo">
            GitHub
        </a>

    </div>
</div>
<footer>
    <div class="footer-links">
        <p>© <span id="year"></span> Vorname Nachname</p>
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
    </div>
</footer>
<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
